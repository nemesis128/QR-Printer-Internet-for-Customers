name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: wifi-voucher-manager

jobs:
  lint-typecheck:
    name: Lint + Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.20'
          cache: 'npm'
          cache-dependency-path: wifi-voucher-manager/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run type-check

  test:
    name: Test (${{ matrix.os }})
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      WIFI_VOUCHER_USE_MOCK_STORAGE: '1'
      WIFI_VOUCHER_SKIP_BLE: '1'
      WIFI_VOUCHER_SKIP_E2E: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.20'
          cache: 'npm'
          cache-dependency-path: wifi-voucher-manager/package-lock.json
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev libudev-dev
      - run: npm ci --ignore-scripts
      - name: Install Electron binary
        run: node node_modules/electron/install.js
      - name: Rebuild native modules (Node ABI)
        run: npm rebuild better-sqlite3 argon2 || true
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage
          path: wifi-voucher-manager/coverage/

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.20'
          cache: 'npm'
          cache-dependency-path: wifi-voucher-manager/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Build installer (Windows only)
        if: runner.os == 'Windows'
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: installer-win
          path: wifi-voucher-manager/dist-installer/*.exe
          retention-days: 14
